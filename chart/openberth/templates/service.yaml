apiVersion: v1
kind: Service
metadata:
  name: {{ include "openberth.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openberth.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
    - port: 443
      targetPort: https
      protocol: TCP
      name: https
  selector:
    {{- include "openberth.selectorLabels" . | nindent 4 }}
